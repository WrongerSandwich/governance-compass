<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56" fill="none">
  <!-- The Governance Compass — Contour Mark (C2-C Elongated Ridge) -->
  <!-- Canonical mark at 56x56. Scale uniformly for other sizes. -->
  <!-- Color: Stone 600 (#85735e) for light backgrounds, Stone 400 (#b5a594) for dark backgrounds -->

  <!-- Outer contour ring -->
  <path d="M18,10 C30,7 44,12 48,22 C52,32 46,44 34,47 C22,50 10,42 8,30 C6,20 10,12 18,10"
        stroke="#85735e" stroke-width="0.8" opacity="0.2"/>

  <!-- Second contour ring -->
  <path d="M20,16 C30,13 40,17 43,24 C46,31 42,40 33,42 C24,44 15,38 13,29 C11,22 14,17 20,16"
        stroke="#85735e" stroke-width="0.9" opacity="0.35"/>

  <!-- Third contour ring -->
  <path d="M22,22 C29,19 37,22 39,27 C41,32 37,37 31,38 C25,39 19,35 18,29 C17,25 19,23 22,22"
        stroke="#85735e" stroke-width="1.0" opacity="0.5"/>

  <!-- Inner contour ring -->
  <path d="M24,26 C28,24 33,26 34,29 C35,32 32,35 28,35 C25,35 22,33 22,30 C22,27 23,26 24,26"
        stroke="#85735e" stroke-width="1.0" opacity="0.65"/>

  <!-- Summit point -->
  <circle cx="26" cy="30" r="2" fill="#85735e"/>
</svg>
