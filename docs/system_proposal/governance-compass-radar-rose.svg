<svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 56 56" fill="none">
  <!-- The Governance Compass — Radar Rose Mark (P-G Final) -->
  <!-- Canonical mark at 56x56. Scale uniformly. -->
  <!-- Four petals: North=Stone/Economic, East=Slate/Power, South=Sage/Society, West=Clay/World -->

  <g transform="translate(28,28)">
    <!-- North petal — Stone (Economic) — tip: 27 -->
    <polygon points="0,-27 6,-6 0,-9 -6,-6" fill="#85735e" opacity="0.7"/>

    <!-- East petal — Slate (Power) — tip: 22 -->
    <polygon points="22,0 6,6 9,0 6,-6" fill="#6b7d8a" opacity="0.5"/>

    <!-- South petal — Sage (Society) — tip: 17 -->
    <polygon points="0,17 -6,6 0,9 6,6" fill="#7a8b6e" opacity="0.45"/>

    <!-- West petal — Clay (World) — tip: 25 -->
    <polygon points="-25,0 -6,-6 -9,0 -6,6" fill="#96716b" opacity="0.55"/>

    <!-- Center dot -->
    <circle cx="0" cy="0" r="3" fill="#85735e"/>
  </g>
</svg>
